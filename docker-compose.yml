version: '2'
services:
  octoeverywhere-connect:
    image: octoeverywhere/octoeverywhere:latest
    environment:
        # Required: The mode of the OctoEverywhere Companion plugin you want to use:
        #   - bambu:      Bambu Connect - for Bambu Lab 3D printers such as the Bambu Lab A1, P1, X1, X2, H2, etc.
        #   - prusalink:  Prusa 3D printers running PrusaLink or Prusa Connect.
        #   - klipper:    Use this for Klipper / Moonraker based printers.
        #   - elegoo:     Elegoo Connect For Elegoo Centauri Carbon (original).
        #   - elegoo_cc2: Elegoo Connect For Elegoo Centauri Carbon 2.
        #
        # Set this to the mode you want to use.
        # YOU MUST ALSO UNCOMMENT THE REQUIRED SETTINGS FOR THE MODE BELLOW.
        - COMPANION_MODE=bambu


        #
        # Bambu Connect
        #
        #  https://octoeverywhere.com/s/access-code
        #- ACCESS_CODE=5285c831
        #
        #  https://octoeverywhere.com/s/bambu-sn
        #- SERIAL_NUMBER=00M09C411200608
        #
        #  Find using the printer's display or use https://octoeverywhere.com/s/bambu-ip
        #- PRINTER_IP=10.0.0.23


        #
        # Elegoo Connect - Elegoo Centauri Carbon (original)
        #
        #  Find using the printer's display or use https://octoeverywhere.com/s/elegoo-ip
        #- PRINTER_IP=XXX.XXX.XXX.XXX


        #
        # Elegoo Connect - Elegoo Centauri Carbon 2
        #
        #  Find using the printer's display or use https://octoeverywhere.com/s/cc2-ip
        #- PRINTER_IP=XXX.XXX.XXX.XXX
        #
        #  Find using the printer's display or use https://octoeverywhere.com/s/cc2-access-code
        #  If the access code is disabled on the printer, use the default value of '123456'.
        #- ACCESS_CODE=123456


        #
        # Klipper / Moonraker
        #
        #  Required - The IP address of the Klipper/Moonraker/Webserver/Printer
        #- PRINTER_IP=XXX.XXX.XXX.XXX
        #
        #  Optional - The port of Moonraker. This defaults to 7125 if not set.
        #- MOONRAKER_PORT=7125
        #
        #  Optional - If your Moonraker needs API key auth, you can generate it in Mainsail or Fluidd and set it here.
        #- MOONRAKER_API_KEY=someApiKey
        #
        #  Optional - The port of frontend webserver. This defaults to 80 if not set.
        #- WEBSERVER_PORT=80


        #
        #  PrusaLink
        #
        #  Required - The IP address of your PrusaLink 3D printer
        #- PRINTER_IP=XXX.XXX.XXX.XXX
        #
        #  Required - EITHER your PrusaLink username/password or API key.
        #
        #  Get Help -> https://octoeverywhere.com/s/prusa-link-password
        #- USERNAME=username
        #- PASSWORD=your-password
        #
        #  Get Help -> https://octoeverywhere.com/s/prusa-link-api-key
        #- API_KEY=your-api-key
        #
        #  Optional - The Prusa Link port. This defaults to 80 if not set.
        #- PRUSALINK_PORT=80


        #
        # Optional Settings For All Modes
        #
        # Set timezone to proper timezone for logs using standard timezones:
        # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List
        - TZ=America/New_York

    volumes:
      # This can also be an absolute path, e.g. /var/octoeverywhere/plugin/data or /c/users/name/plugin/data
      - ./data:/data


